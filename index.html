<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cenvero Video Gallery</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#0b0b0b;
      color:white;
      font-family:Arial,sans-serif;
      padding:40px;
    }

    h1{
      text-align:center;
      font-size:52px;
      margin-bottom:15px;
    }

    .subtitle{
      text-align:center;
      color:#999;
      margin-bottom:50px;
      font-size:18px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(340px,1fr));
      gap:28px;
    }

    .card{
      background:#141414;
      border-radius:22px;
      overflow:hidden;
      border:1px solid #222;
      transition:0.25s;
    }

    .card:hover{
      transform:translateY(-6px);
      border-color:#555;
    }

    video{
      width:100%;
      height:220px;
      background:black;
    }

    .content{
      padding:22px;
    }

    .title{
      font-size:20px;
      font-weight:bold;
      margin-bottom:16px;
      word-break:break-word;
    }

    .buttons{
      display:flex;
      gap:12px;
    }

    .btn{
      flex:1;
      text-align:center;
      text-decoration:none;
      padding:13px;
      border-radius:14px;
      font-weight:bold;
      transition:0.2s;
    }

    .watch{
      background:#ff004c;
      color:white;
    }

    .download{
      background:#232323;
      color:white;
    }

    .btn:hover{
      opacity:0.88;
    }

    footer{
      margin-top:60px;
      text-align:center;
      color:#777;
      font-size:14px;
    }

  </style>
</head>

<body>

  <h1>🎬 Explore Demo Videos</h1>

  <div class="subtitle">
    Auto generated from repository MP4 files
  </div>

  <div class="grid">

    <div class="card">

      <video controls preload="metadata">
        <source src="cetuslaunch.mp4" type="video/mp4">
      </video>

      <div class="content">

        <div class="title">
          cetuslaunch.mp4
        </div>

        <div class="buttons">

          <a class="btn watch"
             href="cetuslaunch.mp4"
             target="_blank">
             ▶ Watch
          </a>

          <a class="btn download"
             href="cetuslaunch.mp4"
             download>
             ⬇ Download
          </a>

        </div>

      </div>

    </div>


    <div class="card">

      <video controls preload="metadata">
        <source src="cetusm.mp4" type="video/mp4">
      </video>

      <div class="content">

        <div class="title">
          cetusm.mp4
        </div>

        <div class="buttons">

          <a class="btn watch"
             href="cetusm.mp4"
             target="_blank">
             ▶ Watch
          </a>

          <a class="btn download"
             href="cetusm.mp4"
             download>
             ⬇ Download
          </a>

        </div>

      </div>

    </div>


  </div>

  <footer>
    Powered by GitHub Actions • Auto Updated
  </footer>

</body>
</html>
