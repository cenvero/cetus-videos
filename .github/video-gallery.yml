name: Generate Video Gallery

on:
  push:
    branches:
      - main
      - master

  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-gallery:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Video Gallery
        run: |
          echo "Searching for MP4 files..."

          cat > index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Video Gallery</title>

            <style>
              *{
                margin:0;
                padding:0;
                box-sizing:border-box;
              }

              body{
                font-family:Arial,sans-serif;
                background:#0f0f0f;
                color:white;
                padding:40px;
              }

              h1{
                text-align:center;
                margin-bottom:40px;
                font-size:42px;
              }

              .grid{
                display:grid;
                grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
                gap:25px;
              }

              .card{
                background:#1a1a1a;
                border-radius:20px;
                overflow:hidden;
                transition:0.3s;
                border:1px solid #2a2a2a;
              }

              .card:hover{
                transform:translateY(-5px);
                border-color:#555;
              }

              video{
                width:100%;
                height:220px;
                background:black;
              }

              .content{
                padding:20px;
              }

              .title{
                font-size:20px;
                font-weight:bold;
                margin-bottom:12px;
                word-break:break-word;
              }

              .buttons{
                display:flex;
                gap:10px;
              }

              .btn{
                flex:1;
                text-align:center;
                text-decoration:none;
                padding:12px;
                border-radius:12px;
                font-weight:bold;
                transition:0.2s;
              }

              .watch{
                background:#ff0033;
                color:white;
              }

              .download{
                background:#252525;
                color:white;
              }

              .btn:hover{
                opacity:0.85;
              }

              .top{
                text-align:center;
                margin-bottom:50px;
                color:#aaa;
              }
            </style>
          </head>

          <body>

            <h1>🎬 Explore Demo Videos</h1>

            <div class="top">
              Auto generated from repository MP4 files
            </div>

            <div class="grid">
          EOF

          find . -type f \( -iname "*.mp4" \) | while read file; do

            cleanfile=$(echo "$file" | sed 's|^\./||')

            filename=$(basename "$cleanfile")

            encoded=$(python3 -c "import urllib.parse; print(urllib.parse.quote('''$cleanfile'''))")

            cat >> index.html << EOF
              <div class="card">
                <video controls preload="metadata">
                  <source src="$encoded" type="video/mp4">
                </video>

                <div class="content">
                  <div class="title">$filename</div>

                  <div class="buttons">
                    <a class="btn watch" href="$encoded" target="_blank">
                      ▶ Watch
                    </a>

                    <a class="btn download" href="$encoded" download>
                      ⬇ Download
                    </a>
                  </div>
                </div>
              </div>
          EOF

          done

          cat >> index.html << 'EOF'
            </div>

          </body>
          </html>
          EOF

      - name: Commit & Push Gallery
        run: |
          git config user.name "cenvero-bot"
          git config user.email "cenvero-bot@cenvero.org "

          git add index.html

          git diff --cached --quiet && echo "No changes" && exit 0

          git commit -m "Auto update video gallery"

          git push origin HEAD:${GITHUB_REF#refs/heads/}
